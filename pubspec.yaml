name: peduli_keluarga
description: "PeduliKeluarga frontend foundation."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2


  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  go_router: ^17.0.0
  google_fonts: ^8.0.0
  mobile_scanner: ^7.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
